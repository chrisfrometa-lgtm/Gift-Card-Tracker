<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Cards - Frometa Family</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F0F4FA;
    --warm-white: #F6F9FF;
    --charcoal: #002D72;
    --dark: #001F52;
    --mid: #4A6FA5;
    --light: #8AAFD4;
    --border: #C8D8EE;
    --gold: #FF5910;
    --gold-light: #FFB088;
    --gold-pale: #FFF0E8;
    --green: #002D72;
    --green-pale: #E0E8F5;
    --red: #C0392B;
    --red-pale: #FDECEA;
    --shadow: 0 2px 20px rgba(0,45,114,0.10);
    --shadow-lg: 0 8px 40px rgba(0,45,114,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* PASSWORD SCREEN */
  .password-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--charcoal);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .password-screen.show { display: flex; }

  .password-card {
    text-align: center;
    max-width: 360px;
    width: 100%;
  }

  .password-card .lock-icon {
    font-size: 3rem;
    margin-bottom: 20px;
    display: block;
  }

  .password-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--warm-white);
    margin-bottom: 8px;
  }

  .password-card p {
    color: var(--light);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }

  .password-input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .password-input-wrap input {
    width: 100%;
    padding: 14px 48px 14px 18px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .password-input-wrap input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 0; }
  .password-input-wrap input:focus { border-color: var(--gold); }
  .password-input-wrap input.wrong { border-color: var(--red); animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    line-height: 1;
  }

  .toggle-pw:hover { color: rgba(255,255,255,0.7); }

  .btn-unlock {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-unlock:hover { background: #D94A0A; transform: translateY(-1px); }

  .pw-error {
    color: var(--red);
    font-size: 0.8rem;
    margin-top: 12px;
    min-height: 20px;
    font-weight: 500;
  }

  /* SYNC STATUS */
  .sync-bar {
    background: var(--charcoal);
    text-align: center;
    padding: 6px 16px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--light);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--light);
    transition: background 0.4s;
  }

  .sync-dot.connected { background: #48B87A; }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SETUP SCREEN */
  .setup-screen {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: var(--cream);
  }

  .setup-screen.show { display: flex; }

  .setup-card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    border: 1.5px solid var(--border);
  }

  .setup-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: var(--charcoal);
  }

  .setup-card p {
    color: var(--mid);
    font-size: 0.88rem;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .setup-card .step {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
    border: 1.5px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--dark);
  }

  .setup-card .step strong {
    color: var(--charcoal);
    font-weight: 600;
  }

  .setup-card .step a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }

  .setup-divider {
    text-align: center;
    color: var(--light);
    font-size: 0.8rem;
    margin: 24px 0 20px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .config-input-group {
    margin-bottom: 14px;
  }

  .config-input-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .config-input-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--charcoal);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-input-group input:focus { border-color: var(--gold); }

  .btn-connect {
    width: 100%;
    padding: 14px;
    background: var(--charcoal);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-connect:hover { background: var(--dark); }

  .setup-error {
    color: var(--red);
    font-size: 0.82rem;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  /* HEADER */
  header {
    background: var(--charcoal);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--warm-white);
    font-weight: 600;
  }

  .header-left p {
    font-size: 0.75rem;
    color: var(--light);
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-settings {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--light);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-settings:hover { background: rgba(255,255,255,0.18); color: white; }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    padding: 13px 22px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    margin-bottom: 28px;
    transition: all 0.2s;
  }

  .add-btn:hover {
    background: #B8963D;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(201,168,76,0.4);
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    padding: 7px 15px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--charcoal);
    border-color: var(--charcoal);
    color: white;
  }

  .filter-btn:hover:not(.active) {
    border-color: var(--charcoal);
    color: var(--charcoal);
  }

  #categoryFilters { margin-bottom: 24px; }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--light);
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 38px 10px 36px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--dark);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .search-wrap input:focus { border-color: var(--charcoal); }
  .search-wrap input::placeholder { color: var(--light); }

  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--light);
    font-size: 0.75rem;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .search-clear:hover { color: var(--mid); }

  /* TOTAL BANNER */
  .total-banner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--charcoal);
    color: white;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 16px;
  }

  .total-banner span { font-size: 0.82rem; opacity: 0.75; font-weight: 500; }
  .total-amount { font-family: 'Playfair Display', serif; font-size: 1.5rem !important; font-weight: 700; opacity: 1 !important; }

  /* CARDS GRID */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 0;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    transition: box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .card:hover { box-shadow: var(--shadow-lg); border-color: #B8C8E0; }
  .card.used { opacity: 0.5; background: var(--cream); }
  .card.expanded { border-color: var(--charcoal); }

  .card-accent {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: var(--gold);
    border-radius: 4px 0 0 4px;
    flex-shrink: 0;
  }

  .card-accent.empty { background: var(--light); }

  /* MAIN ROW */
  .card-main-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px 14px 20px;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-store {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--charcoal);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 2px;
    flex-wrap: wrap;
  }

  .card-cat {
    font-size: 0.68rem;
    color: var(--mid);
    font-weight: 500;
  }

  .card-owner-badge {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--gold);
    background: var(--gold-pale);
    padding: 1px 7px;
    border-radius: 20px;
  }

  .card-balance-col {
    text-align: right;
    flex-shrink: 0;
  }

  .balance-remaining {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1;
  }

  .balance-remaining.zero { color: var(--light); }
  .balance-remaining.low { color: var(--gold); }
  .balance-original { font-size: 0.68rem; color: var(--light); margin-top: 1px; }

  /* PROGRESS BAR — sleek single line */
  .progress-track {
    height: 2px;
    background: var(--border);
    margin: 0 0 0 4px;
  }

  .progress-fill {
    height: 100%;
    background: var(--charcoal);
    transition: width 0.5s ease;
  }

  .progress-fill.low { background: var(--gold); }
  .progress-fill.empty { width: 0 !important; }

  /* ACTIONS */
  .card-actions {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--mid);
    transition: all 0.15s;
    font-size: 13px;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--cream); color: var(--charcoal); border-color: var(--charcoal); }
  .icon-btn.danger:hover { background: var(--red-pale); color: var(--red); border-color: var(--red); }

  /* EXPANDED DETAILS */
  .card-details {
    display: none;
    padding: 14px 20px 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--warm-white);
  }

  .card.expanded .card-details { display: block; }

  .card-detail {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--mid);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .card-detail:last-of-type { border-bottom: none; }

  .card-detail .val {
    font-weight: 500;
    color: var(--dark);
    font-family: monospace;
    letter-spacing: 0.03em;
  }

  .card-detail .val.hidden { letter-spacing: 0.15em; color: var(--light); }

  .pin-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gold);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0;
    margin-left: 8px;
    font-family: 'DM Sans', sans-serif;
  }

  .used-stamp {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: rgba(0,0,0,0.05);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    pointer-events: none;
    white-space: nowrap;
  }

  /* UPDATE BALANCE */
  .update-balance {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  .update-balance input {
    flex: 1;
    padding: 9px 12px;
    font-size: 0.88rem;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }

  .update-balance input:focus { border-color: var(--charcoal); }

  .btn-update {
    padding: 9px 16px;
    background: var(--charcoal);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-update:hover { background: var(--dark); }

  /* CONFIRM DIALOG */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }

  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: white;
    border-radius: 16px;
    padding: 28px 28px 22px;
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
    animation: modalIn 0.2s ease;
  }

  .confirm-box .confirm-icon { font-size: 2rem; margin-bottom: 10px; }
  .confirm-box h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--charcoal); margin-bottom: 6px; }
  .confirm-box p { font-size: 0.83rem; color: var(--mid); margin-bottom: 20px; line-height: 1.5; }

  .confirm-actions { display: flex; gap: 10px; }

  .btn-confirm-cancel {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.2s;
    font-size: 0.88rem;
  }

  .btn-confirm-cancel:hover { background: var(--cream); }

  .btn-confirm-ok {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: var(--charcoal);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.88rem;
  }

  .btn-confirm-ok:hover { background: var(--dark); }
  .btn-confirm-ok.danger { background: var(--red); }
  .btn-confirm-ok.danger:hover { background: #A93226; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 16px 24px 32px;
    font-size: 0.72rem;
    color: var(--light);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--mid);
    grid-column: 1 / -1;
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--charcoal); margin-bottom: 8px; }
  .empty-state p { font-size: 0.88rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 500px;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 24px;
    color: var(--charcoal);
  }

  .form-group { margin-bottom: 16px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--charcoal);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus, select:focus { border-color: var(--gold); }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.2s;
  }

  .btn-cancel:hover { background: var(--cream); }

  .btn-save {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--charcoal);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
  }

  .btn-save:hover { background: var(--dark); }

  /* LOADING */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.show { display: flex; }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--mid);
  }

  #appShell { display: block; }

  @media (max-width: 600px) {
    header { padding: 20px 18px; }
    .header-left h1 { font-size: 1.3rem; }
    main { padding: 24px 16px 60px; }
    .form-row { grid-template-columns: 1fr; }
    .setup-card { padding: 32px 24px; }
    .modal { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div class="password-screen show" id="passwordScreen">
  <div class="password-card">
    <span class="lock-icon">🔐</span>
    <h2>Our Gift Cards</h2>
    <p>Enter the passphrase to access your wallet</p>
    <div class="password-input-wrap">
      <input type="password" id="pwInput" placeholder="Passphrase" onkeydown="if(event.key==='Enter')checkPassword()">
      <button class="toggle-pw" onclick="togglePwVisibility()" id="togglePwBtn">👁</button>
    </div>
    <button class="btn-unlock" onclick="checkPassword()">Unlock</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay show" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting...</div>
</div>

<!-- MAIN APP -->
<div id="appShell">
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Connecting...</span>
  </div>

  <header>
    <div class="header-left">
      <h1>🎁 Gift Cards</h1>
      <p>Frometa Family</p>
    </div>
  </header>

  <main>
    <button class="add-btn" onclick="openModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add Gift Card
    </button>

    <!-- SEARCH BAR -->
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by store name..." oninput="onSearch()" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
    </div>

    <!-- TOTAL BANNER -->
    <div class="total-banner" id="totalBanner">
      <span id="totalLabel">Total across all active cards</span>
      <span class="total-amount" id="totalAmount">$0.00</span>
    </div>

    <div class="filters" id="mainFilters">
      <button class="filter-btn active" onclick="setFilter('active', this)">All Active</button>
      <button class="filter-btn" onclick="setFilter('used', this)">Used Up</button>
      <button class="filter-btn" onclick="setFilter('all', this)">Show All</button>
    </div>
    <div class="filters" id="categoryFilters"></div>

    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <footer id="appFooter">
    <span id="lastUpdatedText">—</span>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Gift Card</h2>
    <div class="form-group">
      <label>Store / Brand</label>
      <input type="text" id="fStore" placeholder="e.g. Amazon, Target, Cheesecake Factory">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Original Balance</label>
        <input type="number" id="fOriginal" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Current Balance</label>
        <input type="number" id="fCurrent" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-group">
      <label>Card Number (optional)</label>
      <input type="text" id="fNumber" placeholder="e.g. 1234 5678 9012 3456">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>PIN / CVV (optional)</label>
        <input type="text" id="fPin" placeholder="e.g. 1234">
      </div>
      <div class="form-group">
        <label>Expiration (optional)</label>
        <input type="text" id="fExpiry" placeholder="e.g. 06/28" maxlength="5">

    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="fCategory">
          <option value="">Select...</option>

<!-- CONFIRM DIALOG -->

    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-ok" id="confirmOkBtn" onclick="confirmAction()">Yes, do it</button>
    </div>
  </div>
</div>

<!-- PASSWORD LOGIC -->
<script>
  const PASSPHRASE = 'HaileyJet';
  const LOCK_TIMEOUT = 10 * 60 * 1000; // 10 minutes
  let lockTimer = null;

  function unlock() {
    sessionStorage.setItem('gc_unlocked', '1');
    sessionStorage.setItem('gc_unlocked_at', Date.now().toString());
    document.getElementById('passwordScreen').classList.remove('show');
    resetLockTimer();
  }

  function lock() {
    sessionStorage.removeItem('gc_unlocked');
    sessionStorage.removeItem('gc_unlocked_at');
    document.getElementById('passwordScreen').classList.add('show');
    document.getElementById('pwInput').value = '';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
    if (lockTimer) clearTimeout(lockTimer);
  }

  function resetLockTimer() {
    if (lockTimer) clearTimeout(lockTimer);
    lockTimer = setTimeout(lock, LOCK_TIMEOUT);
  }

  // Reset timer on any user interaction
  ['click','keydown','touchstart','scroll'].forEach(evt => {
    document.addEventListener(evt, () => {
      if (sessionStorage.getItem('gc_unlocked') === '1') resetLockTimer();
    }, { passive: true });
  });

  function checkPassword() {
    const input = document.getElementById('pwInput');
    const error = document.getElementById('pwError');
    if (input.value === PASSPHRASE) {
      unlock();
      input.value = '';
      error.textContent = '';
    } else {
      input.classList.add('wrong');
      error.textContent = 'Incorrect passphrase. Try again.';
      setTimeout(() => input.classList.remove('wrong'), 500);
      input.value = '';
      input.focus();
    }
  }

  function togglePwVisibility() {
    const input = document.getElementById('pwInput');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // Check session on load — also verify it hasn't been too long
  const unlockedAt = parseInt(sessionStorage.getItem('gc_unlocked_at') || '0');
  if (sessionStorage.getItem('gc_unlocked') === '1' && (Date.now() - unlockedAt < LOCK_TIMEOUT)) {
    document.getElementById('passwordScreen').classList.remove('show');
    resetLockTimer();
  } else {
    sessionStorage.removeItem('gc_unlocked');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
</script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, set, remove, push } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ─── STATE ────────────────────────────────────────────────────────────────
  let db = null;
  let cards = {};
  let editId = null;
  let currentFilter = 'active';
  let currentCategory = null;
  let currentOwner = null;
  let pinVisible = {};
  let numberVisible = {};
  let expanded = {};
  let searchQuery = '';

  window.onSearch = function() {
    searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
    render();
    updateFooter();
  };

  window.clearSearch = function() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('searchClear').style.display = 'none';
    render();
    updateFooter();
  };

  window.toggleExpand = function(id) {
    expanded[id] = !expanded[id];
    render();
  };

  const CATEGORY_ICONS = {
    'Dining':'🍽️','Shopping':'🛍️','Travel':'✈️',
    'Entertainment':'🎬','Grocery':'🛒','Gas':'⛽',
    'Online':'💻','Visa':'💳','Other':'📦'
  };

  // ─── CONFIG ───────────────────────────────────────────────────────────────
  function getSavedConfig() {
    try { return JSON.parse(localStorage.getItem('fb_config')); } catch { return null; }
  }

  function saveConfig(cfg) {
    localStorage.setItem('fb_config', JSON.stringify(cfg));
  }

  window.resetConfig = function() {
    if (confirm('Reset Firebase connection? You\'ll need to re-enter your config.')) {
      localStorage.removeItem('fb_config');
      location.reload();
    }
  };

  // ─── FIREBASE CONNECT ─────────────────────────────────────────────────────
  function initFirebase(cfg) {
    const app = initializeApp(cfg);
    db = getDatabase(app);

    const cardsRef = ref(db, 'giftcards');
    onValue(cardsRef, (snapshot) => {
      cards = snapshot.val() || {};
      setSyncStatus('connected', 'Synced');
      render();
      renderCategoryFilters();
      updateFooter();
    }, (err) => {
      console.error(err);
      setSyncStatus('error', 'Sync error');
    });

    // Refresh footer time display every minute
    setInterval(updateFooter, 60000);

    document.getElementById('loadingOverlay').classList.remove('show');
    document.getElementById('appShell').classList.add('show');
  }

  window.connectFirebase = function() {
    const cfg = {
      apiKey: document.getElementById('cfgApiKey').value.trim(),
      authDomain: document.getElementById('cfgAuthDomain').value.trim(),
      databaseURL: document.getElementById('cfgDatabaseURL').value.trim(),
      projectId: document.getElementById('cfgProjectId').value.trim(),
    };

    if (!cfg.apiKey || !cfg.databaseURL || !cfg.projectId) {
      document.getElementById('setupError').style.display = 'block';
      return;
    }

    try {
      saveConfig(cfg);
      document.getElementById('setupScreen').classList.remove('show');
      document.getElementById('loadingOverlay').classList.add('show');
      initFirebase(cfg);
    } catch(e) {
      document.getElementById('setupError').style.display = 'block';
    }
  };

  // ─── SYNC STATUS ──────────────────────────────────────────────────────────
  function setSyncStatus(state, text) {
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    dot.className = 'sync-dot ' + state;
    txt.textContent = text;
  }

  // ─── CONFIRM DIALOG ───────────────────────────────────────────────────────
  let pendingAction = null;

  function showConfirm({ icon, title, msg, okLabel, danger, action }) {
    document.getElementById('confirmIcon').textContent = icon;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    const okBtn = document.getElementById('confirmOkBtn');
    okBtn.textContent = okLabel;
    okBtn.className = 'btn-confirm-ok' + (danger ? ' danger' : '');
    pendingAction = action;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  window.closeConfirm = function() {
    document.getElementById('confirmOverlay').classList.remove('open');
    pendingAction = null;
  };

  window.confirmAction = function() {
    if (pendingAction) pendingAction();
    closeConfirm();
  };

  // ─── CRUD ─────────────────────────────────────────────────────────────────
  window.saveCard = function() {
    const store = document.getElementById('fStore').value.trim();
    const original = parseFloat(document.getElementById('fOriginal').value) || 0;
    const current = parseFloat(document.getElementById('fCurrent').value);

    if (!store) { alert('Please enter a store name.'); return; }

    setSyncStatus('syncing', 'Saving...');

    const card = {
      store,
      original,
      current: isNaN(current) ? original : current,
      number: document.getElementById('fNumber').value.trim(),
      pin: document.getElementById('fPin').value.trim(),
      expiry: document.getElementById('fExpiry').value.trim(),
      category: document.getElementById('fCategory').value,
      owner: document.getElementById('fOwner').value,
      used: editId ? (cards[editId]?.used || false) : false,
      addedAt: editId ? (cards[editId]?.addedAt || Date.now()) : Date.now(),
      updatedBy: document.getElementById('fOwner').value || 'Someone',
      updatedAt: Date.now()
    };

    const cardRef = editId
      ? ref(db, 'giftcards/' + editId)
      : push(ref(db, 'giftcards'));

    set(editId ? ref(db, 'giftcards/' + editId) : cardRef, card);
    closeModal();
  };

  window.deleteCard = function(id, e) {
    e.stopPropagation();
    const c = cards[id];
    showConfirm({
      icon: '🗑️',
      title: 'Delete this card?',
      msg: `"${c.store}" will be permanently removed.`,
      okLabel: 'Yes, delete',
      danger: true,
      action: () => {
        setSyncStatus('syncing', 'Deleting...');
        remove(ref(db, 'giftcards/' + id));
      }
    });
  };

  window.toggleUsed = function(id, e) {
    e.stopPropagation();
    const card = cards[id];
    const markingUsed = !card.used;
    showConfirm({
      icon: markingUsed ? '✅' : '↩️',
      title: markingUsed ? 'Mark as used?' : 'Mark as active?',
      msg: markingUsed
        ? `"${card.store}" will be moved to your Used cards.`
        : `"${card.store}" will be moved back to Active cards.`,
      okLabel: markingUsed ? 'Yes, mark used' : 'Yes, reactivate',
      danger: false,
      action: () => {
        setSyncStatus('syncing', 'Saving...');
        set(ref(db, 'giftcards/' + id), { ...card, used: !card.used, updatedBy: card.owner || 'Someone', updatedAt: Date.now() });
      }
    });
  };

  window.updateBalance = function(id) {
    const input = document.getElementById('newBal_' + id);
    const val = parseFloat(input.value);
    if (isNaN(val) || val < 0) { alert('Enter a valid balance.'); return; }
    setSyncStatus('syncing', 'Saving...');
    set(ref(db, 'giftcards/' + id), { ...cards[id], current: val, updatedBy: cards[id].owner || 'Someone', updatedAt: Date.now() });
    input.value = '';
  };

  // ─── MODAL ────────────────────────────────────────────────────────────────
  window.openModal = function(id = null) {
    editId = id;
    const c = id ? cards[id] : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Gift Card' : 'Add Gift Card';
    document.getElementById('fStore').value = c?.store || '';
    document.getElementById('fOriginal').value = c?.original || '';
    document.getElementById('fCurrent').value = c?.current || '';
    document.getElementById('fNumber').value = c?.number || '';
    document.getElementById('fPin').value = c?.pin || '';
    document.getElementById('fExpiry').value = c?.expiry || '';
    document.getElementById('fCategory').value = c?.category || '';
    document.getElementById('fOwner').value = c?.owner || '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fStore').focus(), 100);
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null;
  };

  window.closeModalIfOutside = function(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  };

  window.togglePin = function(id) {
    const card = cards[id];
    pinVisible[id] = !pinVisible[id];
    const display = document.getElementById('pinDisplay_' + id);
    const btn = document.getElementById('pinBtn_' + id);
    if (display) {
      display.innerHTML = `<span class="${pinVisible[id] ? '' : 'hidden'}">${pinVisible[id] ? card.pin : '••••'}</span><button class="pin-toggle" onclick="event.stopPropagation(); togglePin('${id}')" id="pinBtn_${id}">${pinVisible[id] ? 'hide' : 'show'}</button>`;
    }
  };

  window.toggleNumber = function(id) {
    const card = cards[id];
    numberVisible[id] = !numberVisible[id];
    const display = document.getElementById('numDisplay_' + id);
    const btn = document.getElementById('numBtn_' + id);
    if (display) display.textContent = numberVisible[id] ? card.number : maskNumber(card.number);
    if (btn) btn.textContent = numberVisible[id] ? 'hide' : 'show';
  };

  // ─── FILTERS ──────────────────────────────────────────────────────────────
  window.setFilter = function(f, btn) {
    currentFilter = f;
    currentCategory = null;
    currentOwner = null;
    document.querySelectorAll('#mainFilters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('#categoryFilters .filter-btn').forEach(b => b.classList.remove('active'));
    render();
  };

  window.setCategoryFilter = function(cat) {
    currentCategory = currentCategory === cat ? null : cat;
    renderCategoryFilters();
    render();
  };

  window.setOwnerFilter = function(owner) {
    currentOwner = currentOwner === owner ? null : owner;
    renderCategoryFilters();
    render();
  };

  function getUsedCategories() {
    const cats = new Set(Object.values(cards).map(c => c.category).filter(Boolean));
    return [...cats].sort();
  }

  function renderCategoryFilters() {
    const cats = getUsedCategories();
    const el = document.getElementById('categoryFilters');
    let html = '';

    // Owner filters — always show
    html += '<span style="font-size:0.72rem;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;align-self:center;">Owner:</span> ';
    html += `<button class="filter-btn${currentOwner === 'Chris' ? ' active' : ''}" onclick="setOwnerFilter('Chris')">👤 Chris</button>`;
    html += `<button class="filter-btn${currentOwner === 'Kate' ? ' active' : ''}" onclick="setOwnerFilter('Kate')">👤 Kate</button>`;

    // Category filters — only if cards have categories
    if (cats.length) {
      html += '<span style="font-size:0.72rem;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;align-self:center;margin-left:8px;">Category:</span> ';
      html += cats.map(cat => `
        <button class="filter-btn${currentCategory === cat ? ' active' : ''}" onclick="setCategoryFilter('${cat}')">
          ${CATEGORY_ICONS[cat] || '📦'} ${cat}
        </button>`).join('');
    }

    el.innerHTML = html;
  }

  function getFilteredCards() {
    let entries = Object.entries(cards).map(([id, c]) => ({ id, ...c }));
    entries.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
    switch(currentFilter) {
      case 'active': entries = entries.filter(c => !c.used && c.current > 0); break;
      case 'used':   entries = entries.filter(c => c.used || c.current === 0); break;
    }
    if (currentCategory) entries = entries.filter(c => c.category === currentCategory);
    if (currentOwner) entries = entries.filter(c => c.owner === currentOwner);
    if (searchQuery) entries = entries.filter(c => c.store.toLowerCase().includes(searchQuery));
    return entries;
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }

  function timeAgo(ts) {
    if (!ts) return 'a while ago';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  function updateFooter() {
    const allCards = Object.values(cards);
    if (!allCards.length) { document.getElementById('lastUpdatedText').textContent = '—'; return; }
    const latest = allCards.reduce((a, b) => ((b.updatedAt || 0) > (a.updatedAt || 0) ? b : a));
    if (!latest.updatedAt) { document.getElementById('lastUpdatedText').textContent = '—'; return; }
    document.getElementById('lastUpdatedText').textContent =
      `Last updated by ${latest.updatedBy || 'Someone'} · ${timeAgo(latest.updatedAt)}`;
  }

  function maskNumber(num) {
    if (!num) return null;
    const cleaned = num.replace(/\s/g, '');
    if (cleaned.length <= 4) return num;
    return '•••• •••• •••• ' + cleaned.slice(-4);
  }

  function updateTotal(filtered) {
    const total = filtered.reduce((sum, c) => sum + (parseFloat(c.current) || 0), 0);
    document.getElementById('totalAmount').textContent = fmt(total);
    const count = filtered.length;
    const isSearching = searchQuery.length > 0;
    const hasFilters = currentCategory || currentOwner;
    let label = '';
    if (isSearching) label = `Total across ${count} result${count !== 1 ? 's' : ''}`;
    else if (hasFilters) label = `Total across ${count} filtered card${count !== 1 ? 's' : ''}`;
    else if (currentFilter === 'used') label = `Total across ${count} used card${count !== 1 ? 's' : ''}`;
    else label = `Total across ${count} active card${count !== 1 ? 's' : ''}`;
    document.getElementById('totalLabel').textContent = label;
  }

  function render() {
    const grid = document.getElementById('cardsGrid');
    const filtered = getFilteredCards();
    updateTotal(filtered);

    if (!filtered.length) {
      const msgs = {
        active: { icon: '🎁', title: 'No active gift cards', sub: 'Add your first one above!' },
        used:   { icon: '✅', title: 'No used cards', sub: 'Cards you\'ve marked as used appear here.' },
        all:    { icon: '🎁', title: 'No gift cards yet', sub: 'Add your first one above!' }
      };
      const m = msgs[currentFilter] || { icon: '🔍', title: 'No cards found', sub: 'Try a different filter.' };
      grid.innerHTML = `<div class="empty-state">
        <div class="icon">${m.icon}</div>
        <h3>${m.title}</h3>
        <p>${m.sub}</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(c => {
      const pct = c.original > 0 ? Math.min(100, (c.current / c.original) * 100) : 0;
      const isLow = pct > 0 && pct <= 25;
      const isEmpty = c.current <= 0;
      const balClass = isEmpty ? 'zero' : isLow ? 'low' : '';
      const fillClass = isEmpty ? 'empty' : isLow ? 'low' : '';
      const catIcon = c.category ? (CATEGORY_ICONS[c.category] || '📦') : null;
      const pinShown = pinVisible[c.id];
      const isExpanded = expanded[c.id];

      return `
      <div class="card${c.used ? ' used' : ''}${isExpanded ? ' expanded' : ''}" id="card_${c.id}" onclick="toggleExpand('${c.id}')">
        <div class="card-accent${isEmpty || c.used ? ' empty' : ''}"></div>
        ${c.used ? '<div class="used-stamp">Used</div>' : ''}

        <div class="card-main-row">
          <div class="card-info">
            <div class="card-store">${c.store}</div>
            <div class="card-meta">
              ${catIcon ? `<span class="card-cat">${catIcon} ${c.category}</span>` : ''}
              ${c.owner ? `<span class="card-owner-badge">👤 ${c.owner}</span>` : ''}
            </div>
          </div>

          <div class="card-balance-col">
            <div class="balance-remaining ${balClass}">${fmt(c.current)}</div>
            <div class="balance-original">of ${fmt(c.original)}</div>
          </div>

          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" title="${c.used ? 'Mark active' : 'Mark as used'}" onclick="toggleUsed('${c.id}', event)">
              ${c.used ? '↩' : '✓'}
            </button>
            <button class="icon-btn" title="Edit" onclick="event.stopPropagation(); openModal('${c.id}')">✎</button>
            <button class="icon-btn danger" title="Delete" onclick="deleteCard('${c.id}', event)">✕</button>
          </div>
        </div>

        <div class="progress-track">
          <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>

        <div class="card-details">
          ${c.number ? `
          <div class="card-detail">
            <span>Card #</span>
            <span class="val" onclick="event.stopPropagation()">
              <span id="numDisplay_${c.id}">${maskNumber(c.number)}</span>
              <button class="pin-toggle" onclick="event.stopPropagation(); toggleNumber('${c.id}')" id="numBtn_${c.id}">show</button>
            </span>
          </div>` : ''}
          ${c.expiry ? `<div class="card-detail"><span>Expires</span><span class="val">📅 ${c.expiry}</span></div>` : ''}
          ${c.pin ? `<div class="card-detail"><span>PIN / CVV</span><span class="val" id="pinDisplay_${c.id}" onclick="event.stopPropagation()"><span class="hidden">••••</span><button class="pin-toggle" onclick="event.stopPropagation(); togglePin('${c.id}')" id="pinBtn_${c.id}">show</button></span></div>` : ''}
          ${c.owner ? `<div class="card-detail"><span>Owner</span><span class="val">👤 ${c.owner}</span></div>` : ''}
          ${c.category ? `<div class="card-detail"><span>Category</span><span class="val">${CATEGORY_ICONS[c.category] || '📦'} ${c.category}</span></div>` : ''}
          <div class="update-balance" onclick="event.stopPropagation()">
            <input type="number" id="newBal_${c.id}" placeholder="New balance" min="0" step="0.01">
            <button class="btn-update" onclick="updateBalance('${c.id}')">Update</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ─── KEYBOARD ─────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ─── BOOT ─────────────────────────────────────────────────────────────────
  initFirebase({
    apiKey: "AIzaSyC6gBBDtOByoZBvB0WaNEAODDyI1zM-Mws",
    authDomain: "gift-card-tracker-ac086.firebaseapp.com",
    databaseURL: "https://gift-card-tracker-ac086-default-rtdb.firebaseio.com",
    projectId: "gift-card-tracker-ac086"
  });
</script>
</body>
